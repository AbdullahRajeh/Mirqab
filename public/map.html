<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة عيوب الطرق الذكية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&family=Changa:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/map.css" />
  </head>
  <body>
    <div id="map" class="map" dir="ltr" role="application" aria-label="Riyadh map"></div>
    <canvas id="space-overlay" class="space-overlay" aria-hidden="true"></canvas>

    <nav class="map-nav" aria-label="Main Navigation">
      <div class="nav-brand">
        <div class="nav-title">
          <p class="nav-eyebrow">MIRQAB</p>
          <h1>مراقبة عيوب الطرق</h1>
        </div>
      </div>

      <div class="nav-actions">
        <button type="button" id="upload-video" class="btn-primary" style="display: none;">رفع فيديو جديد</button>
        <button type="button" id="open-dashboard" class="btn-secondary">لوحة التحليلات</button>
        <button type="button" id="simulate-ai" class="btn-icon-refresh" aria-label="تحديث البيانات" title="تحديث البيانات">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"></path>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </nav>

    <div class="top-left-actions">
      <button type="button" id="auth-action-btn" class="btn-spliced-action" hidden>العودة للرئيسية</button>
    </div>

    <div class="status-message-container">
      <p id="message" class="message" aria-live="polite"></p>
    </div>

    <!-- Slide-in Dashboard -->
    <aside id="dashboard-panel" class="dashboard-panel">
      <header class="dashboard-head">
        <div>
          <p class="eyebrow">التحليل المكاني</p>
          <h2>سلامة البنية التحتية</h2>
        </div>
        <button type="button" id="close-dashboard" class="close-btn" aria-label="Close Dashboard">✕</button>
      </header>

      <section class="stats">
        <div class="card">
          <h3>إجمالي العيوب</h3>
          <p id="total-pins" class="value">0</p>
        </div>
        <div class="card">
            <h3>إجمالي الفيديوهات</h3>
            <p id="urgent-pins" class="value small value-danger">0</p>
          </div>
          <div class="card">
            <h3>الإطارات الفريدة</h3>
            <p id="in-progress-pins" class="value small value-accent">0</p>
          </div>
          <div class="card">
            <h3>متوسط الثقة</h3>
            <p id="fixed-pins" class="value small">0</p>
          </div>
          <div class="card">
            <h3>أدنى ثقة</h3>
            <p id="today-pins" class="value small">0</p>
          </div>
          <div class="card">
            <h3>أعلى ثقة</h3>
            <p id="week-pins" class="value small">0</p>
          </div>
          <div class="card">
            <h3>نقاط الخريطة</h3>
            <p id="avg-response-time" class="value small">0</p>
          </div>
          <div class="card">
            <h3>الأكثر اكتشافاً</h3>
            <p id="worst-hood" class="value small value-danger">-</p>
          </div>
        </section>

        <section>
           <canvas id="defectsChart" height="180"></canvas>
        </section>

        <section class="table-wrap">
        <div class="table-head">
          <h3>سجل الاكتشافات</h3>
          <button id="clear-pins" type="button" class="danger-btn">إعادة التحميل</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>الصورة</th>
                <th>الفيديو</th>
                <th>الثقة</th>
                <th>الإجراء</th>
              </tr>
            </thead>
            <tbody id="pins-body"></tbody>
          </table>
        </div>
      </section>
    </aside>

    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module" src="js/main.js"></script>
  </body>

</html>
