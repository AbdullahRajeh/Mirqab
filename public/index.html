<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>متتبع الحفر بالرياض بالذكاء الاصطناعي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700;800&family=Changa:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div id="map" class="map" dir="ltr" role="application" aria-label="Riyadh map"></div>
    <canvas id="space-overlay" class="space-overlay" aria-hidden="true"></canvas>

    <section class="overlay" aria-label="Coordinate controls">
      <div class="brand-text">
        <img src="assets/logo.svg" alt="Mirqab Logo" class="brand-logo" aria-hidden="true" />
        <p class="eyebrow">مرقب للذكاء الاصطناعي</p>
        <h1>مركز اكتشاف الحفر</h1>
      </div>

      <div class="actions">
        <button type="button" id="simulate-ai" class="action-secondary">محاكاة الذكاء الاصطناعي</button>
        <button type="button" id="open-dashboard" class="dashboard-link">فتح لوحة التحليلات</button>
      </div>

      <p id="message" class="message" aria-live="polite"></p>
    </section>

    <!-- Slide-in Dashboard -->
    <aside id="dashboard-panel" class="dashboard-panel">
      <header class="dashboard-head">
        <div>
          <p class="eyebrow">التحليل المكاني</p>
          <h2>سلامة البنية التحتية</h2>
        </div>
        <button type="button" id="close-dashboard" class="close-btn" aria-label="Close Dashboard">✕</button>
      </header>

      <section class="stats">
        <div class="card">
          <h3>إجمالي العيوب</h3>
          <p id="total-pins" class="value">0</p>
        </div>
        <div class="card">
            <h3>تدخل عاجل</h3>
            <p id="urgent-pins" class="value small value-danger">0</p>
          </div>
          <div class="card">
            <h3>قيد المعالجة</h3>
            <p id="in-progress-pins" class="value small value-accent">0</p>
          </div>
          <div class="card">
            <h3>تم معالجتها</h3>
            <p id="fixed-pins" class="value small">0</p>
          </div>
          <div class="card">
            <h3>تم رصدها اليوم</h3>
            <p id="today-pins" class="value small">0</p>
          </div>
          <div class="card">
            <h3>خلال آخر 7 أيام</h3>
            <p id="week-pins" class="value small">0</p>
          </div>
          <div class="card">
            <h3>متوسط الاستجابة</h3>
            <p id="avg-response-time" class="value small">48 ساعة</p>
          </div>
          <div class="card">
            <h3>الأكثر تضرراً</h3>
            <p id="worst-hood" class="value small value-danger">-</p>
          </div>
        </section>

        <section>
           <canvas id="defectsChart" height="180"></canvas>
        </section>

        <section class="table-wrap">
        <div class="table-head">
          <h3>سجل الاكتشافات</h3>
          <button id="clear-pins" type="button" class="danger-btn">مسح البيانات</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>الصورة</th>
                <th>الحي</th>
                <th>الثقة</th>
                <th>الإجراء</th>
              </tr>
            </thead>
            <tbody id="pins-body"></tbody>
          </table>
        </div>
      </section>
    </aside>

    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="module" src="js/main.js"></script>
  </body>

</html>
