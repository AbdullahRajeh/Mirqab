<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة تحليلات العيوب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>
  <body>
    <main class="dashboard-page">
      <header class="dashboard-page-head">
        <div>
          <p class="eyebrow">التحليل المكاني</p>
          <h1>تحليلات اكتشاف العيوب</h1>
        </div>
        <a href="/" class="close-btn" aria-label="Back to map">عودة</a>
      </header>

      <section class="stats">
        <div class="card">
          <h3>إجمالي العيوب</h3>
          <p id="total-pins" class="value">0</p>
        </div>
        <div class="card">
          <h3>الأكثر اكتشافاً</h3>
          <p id="worst-hood" class="value small" style="color:var(--danger);">-</p>
        </div>
        <div class="card">
          <h3>متوسط الثقة</h3>
          <p id="avg-confidence" class="value small" style="color:var(--accent);">0%</p>
        </div>
      </section>

      <section class="dashboard-chart">
        <canvas id="severityChart" height="180"></canvas>
      </section>

      <section class="table-wrap">
        <div class="table-head">
          <h3>سجل الاكتشافات</h3>
          <button id="clear-pins" type="button" class="danger-btn">إعادة التحميل</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>الصورة</th>
                <th>الفيديو</th>
                <th>الثقة</th>
                <th>الإجراء</th>
              </tr>
            </thead>
            <tbody id="pins-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
