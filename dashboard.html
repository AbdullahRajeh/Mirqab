<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Active Pin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="head">
        <div>
          <p class="eyebrow">Active Dashboard</p>
          <h1>Riyadh location activity</h1>
        </div>
        <a class="back" href="index.html">Back To Map</a>
      </header>

      <section class="stats" aria-label="Pin statistics">
        <article class="card">
          <h2>Total Pins</h2>
          <p id="total-pins" class="value">0</p>
        </article>
        <article class="card">
          <h2>Latest Pin</h2>
          <p id="latest-pin" class="value small">No pins yet</p>
        </article>
        <article class="card">
          <h2>Center Point</h2>
          <p id="center-point" class="value small">-</p>
        </article>
      </section>

      <section class="map-wrap">
        <div id="dashboard-map" class="map" role="application" aria-label="Saved Riyadh pin map"></div>
      </section>

      <section class="table-wrap" aria-label="Pin list">
        <div class="table-head">
          <h2>Saved Pins</h2>
          <button id="clear-pins" type="button">Clear All Pins</button>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Latitude</th>
                <th>Longitude</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody id="pins-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="dashboard.js"></script>
  </body>
</html>
